<main class="main-content">
<section class="page-shell">
  <div class="page-card">
    <div class="page-header">
      <h1>My Tasks</h1>
      <p>Keep an eye on the work assigned to you.</p>
    </div>

    <div class="filters">
      <button type="button" class="filter-btn active">All</button>
      <button type="button" class="filter-btn">Todo</button>
      <button type="button" class="filter-btn">In Progress</button>
      <button type="button" class="filter-btn">Done</button>
    </div>

    <div class="tasks-grid">
      <div class="task-card">
        <div class="task-header">
          <h2>Complete project proposal</h2>
          <span class="status-badge todo">Todo</span>
        </div>
        <button type="button">Mark as Done</button>
      </div>

      <div class="task-card">
        <div class="task-header">
          <h2>Review code changes</h2>
          <span class="status-badge progress">In Progress</span>
        </div>
        <button type="button">Mark as Done</button>
      </div>

      <div class="task-card">
        <div class="task-header">
          <h2>Deploy to production</h2>
          <span class="status-badge done">Done</span>
        </div>
        <button type="button" disabled>Completed</button>
      </div>
    </div>
  </div>
</section>
</main>
