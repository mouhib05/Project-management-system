<main class="page-container futuristic-project-detail">
    <div class="animated-bg-layer"></div>

    <header class="project-header glass-panel modern-3d-hover">
        <div class="header-content">
            <div class="title-section">
                <span class="badge ai-badge">AI Enhanced</span>
                <h1 class="gradient-text">E-Commerce Platform Revamp</h1>
                <p class="subtitle">Next-gen digital storefront modernization</p>
            </div>
            
            <div class="status-section">
                <div class="status-card">
                    <div class="status-icon deadline-icon"><i class="fa-regular fa-calendar"></i></div>
                    <div class="status-data">
                        <span class="label">Deadline</span>
                        <span class="value">Dec 31, 2022</span>
                    </div>
                </div>
                <div class="status-card">
                    <div class="status-icon progress-icon"><i class="fa-solid fa-bolt"></i></div>
                    <div class="status-data">
                        <span class="label">Status</span>
                        <span class="value in-progress-text">In Progress</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-header">
                <span class="progress-label">Completion Status</span>
                <span class="progress-percentage">29%</span>
            </div>
            <div class="futuristic-progress-bar">
                <div class="progress-fill floating-element"></div>
                <div class="progress-glow"></div>
            </div>
        </div>
    </header>

    <section class="task-section">
        <div class="section-header">
            <h2>Project Modules</h2>
            <div class="decorative-line"></div>
        </div>
        
        <div class="task-wrapper glass-panel modern-3d-hover">
            <app-task></app-task>
        </div>
    </section>
</main>
