<!-- src/app/pages/create-task/create-task.component.html -->
<main class="main-content">
<div class="form-container">
    <h2>Register</h2>

    <!-- Bind the FormGroup -->
    <form [formGroup]="userDataForm" (ngSubmit)="onSubmit()">

        <!-- Title Field -->
        <div class="form-group">
            <label for="name">first name</label>
            <input type="text" id="name" formControlName="name" class="form-control"
                [class.is-invalid]="f['name'].invalid && f['name'].touched" />
            <!-- Validation Error Messages -->
            <div class="error-message" *ngIf="f['name'].invalid && f['name'].touched">
                <small *ngIf="f['name'].errors?.['required']">name is required.</small>
                <small *ngIf="f['name'].errors?.['minlength']">name must be at least 3 characters.</small>
            </div>
        </div>

        <!-- Description Field -->
        <div class="form-group">
            <label for="lastName">last name</label>
            <input id="lastName" formControlName="lastName"
                [class.is-invalid]="f['lastName'].invalid && f['lastName'].touched" class="form-control" />
            <div class="error-message" *ngIf="f['lastName'].invalid && f['lastName'].touched">
                <small *ngIf="f['lastName'].errors?.['required']">last Name is required.</small>
            </div>
        </div>

        <!-- Progress Field -->
        <div class="form-group">
            <label for="email">email</label>
            <input class="form-control" type="text" id="email" formControlName="email"
                [class.is-invalid]="f['email'].invalid && f['email'].touched" />
            <div class="error-message" *ngIf="f['email'].invalid && f['email'].touched">
                <small *ngIf="f['email'].errors?.['required']">email is required.</small>
            </div>
        </div>

        <div class="form-group">
            <label for="password">password</label>
            <input class="form-control" type="password" id="password" formControlName="password"
                [class.is-invalid]="f['password'].invalid && f['password'].touched" />
            <div class="error-message" *ngIf="f['password'].invalid && f['password'].touched">
                <small *ngIf="f['password'].errors?.['required']">password is required.</small>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="userDataForm.invalid || isSubmitting" class="btn-primary">
            {{ isSubmitting ? 'Creating User...' : 'Create User' }}
        </button>

    </form>
</div>
</main>
